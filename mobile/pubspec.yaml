name: pethiyan
description: LCommerce customer mobile app — iOS & Android
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- State management ---
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # --- Navigation ---
  go_router: ^14.8.1

  # --- Networking ---
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.1
  dio_cache_interceptor_hive_store: ^4.0.0
  connectivity_plus: ^6.1.1

  # --- Secure storage & local DB ---
  flutter_secure_storage: ^9.2.4
  hive_flutter: ^1.1.0

  # --- Firebase ---
  firebase_core: ^3.9.0
  firebase_messaging: ^15.2.4
  firebase_analytics: ^11.4.4
  flutter_local_notifications: ^18.0.1

  # --- Auth ---
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  sms_autofill: ^2.4.1

  # --- Payments ---
  razorpay_flutter: ^1.4.3
  flutter_stripe: ^12.5.0
  flutterwave_standard: ^1.1.0
  # flutter_paystack: removed — outdated intl constraint; Paystack handled via WebView

  # --- Maps ---
  google_maps_flutter: ^2.9.0

  # --- Images ---
  cached_network_image: ^3.4.1

  # --- UI ---
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  flutter_native_splash: ^2.4.4

  # --- Utilities ---
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  dartz: ^0.10.1
  equatable: ^2.0.7
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  geolocator: ^14.0.2
  flutter_jailbreak_detection: ^1.10.0
  package_info_plus: ^8.1.3
  webview_flutter: ^4.10.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.9.0
  mockito: ^5.4.4
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
